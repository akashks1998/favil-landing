<!DOCTYPE html>
<!-- Source for og-image.png (the social share card). Regenerate with:
     chrome --headless=new --window-size=1200,630 --force-device-scale-factor=1 \
       --screenshot=og-image.png file://.../og-image.html -->
<html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;overflow:hidden;}
  body{
    font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
    background:#0f0a06;color:#fff5eb;
    display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;
    background-image:
      radial-gradient(520px 520px at 18% 18%, rgba(255,107,53,0.16), transparent 70%),
      radial-gradient(560px 560px at 86% 30%, rgba(255,77,109,0.10), transparent 70%),
      radial-gradient(640px 640px at 70% 90%, rgba(255,179,71,0.12), transparent 72%);
  }
  .flames{width:118px;height:118px;margin-bottom:36px;filter:drop-shadow(0 0 42px rgba(255,107,53,0.5));}
  h1{font-size:94px;font-weight:800;line-height:0.98;letter-spacing:-0.03em;text-align:center;}
  .grad{background:linear-gradient(115deg,#ff6b35,#ffb347 70%,#ffe0a0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .tag{margin-top:30px;font-size:31px;font-weight:400;color:#a0917e;text-align:center;}
  .foot{position:absolute;bottom:48px;display:flex;align-items:center;gap:18px;font-size:26px;color:#a0917e;}
  .wm{font-size:35px;font-weight:800;color:#fff5eb;letter-spacing:0.01em;}
  .wm b{background:linear-gradient(115deg,#ff6b35,#ffb347,#ffe0a0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .dot{width:5px;height:5px;border-radius:50%;background:#3d2e1e;}
</style></head><body>
  <svg class="flames" viewBox="0 0 200 200" fill="none" aria-hidden="true">
    <defs><linearGradient id="f" x1="0" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#e85d2c"/><stop offset="0.55" stop-color="#ff6b35"/>
      <stop offset="0.85" stop-color="#ffb347"/><stop offset="1" stop-color="#ffe0a0"/>
    </linearGradient></defs>
    <path d="M75 155 C75 155, 50 120, 55 90 C58 70, 70 55, 78 40 C82 50, 90 65, 88 80 C86 95, 95 110, 95 130 C95 148, 85 158, 75 155Z" fill="url(#f)"/>
    <path d="M125 155 C125 155, 150 120, 145 90 C142 70, 130 55, 122 40 C118 50, 110 65, 112 80 C114 95, 105 110, 105 130 C105 148, 115 158, 125 155Z" fill="url(#f)"/>
  </svg>
  <h1>Grow <span class="grad">closer</span>,<br>every&nbsp;day.</h1>
  <p class="tag">A private space for the two of you.</p>
  <div class="foot"><span class="wm">fa<b>v</b>il</span><span class="dot"></span><span>Now on Google Play</span></div>
</body></html>
